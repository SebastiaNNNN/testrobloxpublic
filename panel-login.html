<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEVID RP - Panel Login</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");

    :root {
      --bg-0: #06080f;
      --bg-1: #111829;
      --card: rgba(17, 24, 40, 0.78);
      --line: rgba(122, 142, 179, 0.28);
      --text: #edf2ff;
      --muted: #a6b3d1;
      --accent-1: #3dd9b1;
      --accent-2: #49a5ff;
      --danger: #ff7d7d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(1200px 580px at 12% -5%, rgba(73, 165, 255, 0.22), transparent 60%),
        radial-gradient(900px 540px at 86% 112%, rgba(61, 217, 177, 0.18), transparent 60%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1));
      padding: 24px;
    }

    .grid-noise {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 50%, #000 40%, transparent 95%);
      opacity: 0.25;
      pointer-events: none;
    }

    .blob {
      position: fixed;
      width: 320px;
      height: 320px;
      filter: blur(58px);
      border-radius: 50%;
      pointer-events: none;
      animation: floaty 7s ease-in-out infinite;
    }

    .blob.a {
      background: rgba(73, 165, 255, 0.26);
      left: -70px;
      top: 10%;
    }

    .blob.b {
      background: rgba(61, 217, 177, 0.22);
      right: -70px;
      bottom: 2%;
      animation-delay: -2.2s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-18px) translateX(12px); }
    }

    .card {
      width: min(460px, 100%);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      padding: 30px;
      animation: showUp 0.55s ease;
    }

    @keyframes showUp {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(73, 165, 255, 0.35);
      border-radius: 999px;
      padding: 6px 10px;
      color: #b9d8ff;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      background: rgba(15, 31, 58, 0.56);
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-1);
      box-shadow: 0 0 0 0 rgba(61, 217, 177, 0.9);
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(61, 217, 177, 0.6); }
      70% { box-shadow: 0 0 0 10px rgba(61, 217, 177, 0); }
      100% { box-shadow: 0 0 0 0 rgba(61, 217, 177, 0); }
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 45px);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    h1 .alt {
      color: transparent;
      background: linear-gradient(140deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      margin: 10px 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      display: none;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 125, 125, 0.45);
      background: rgba(53, 18, 28, 0.64);
      color: #ffc6c6;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
      width: 15px;
      height: 15px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(128, 147, 185, 0.3);
      border-radius: 13px;
      background: rgba(11, 17, 29, 0.78);
      color: var(--text);
      padding: 12px 12px 12px 36px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder {
      color: #8593b3;
    }

    input:focus {
      border-color: rgba(73, 165, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(73, 165, 255, 0.14);
      background: rgba(12, 24, 44, 0.9);
    }

    .btn {
      margin-top: 4px;
      width: 100%;
      border: 0;
      border-radius: 13px;
      padding: 13px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: #041119;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 14px 26px rgba(73, 165, 255, 0.25);
      transition: transform 0.14s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 28px rgba(73, 165, 255, 0.32);
      filter: saturate(1.06);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #8a98b9;
    }

    .footer strong {
      color: #c4dcff;
      font-weight: 600;
    }

    @media (max-width: 560px) {
      .card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-noise"></div>
  <div class="blob a"></div>
  <div class="blob b"></div>

  <section class="card">
    <span class="top-badge"><span class="pulse"></span> secure admin access</span>
    <h1>SEVID <span class="alt">PANEL</span></h1>
    <p class="subtitle">Autentificare pentru administrare server. Datele intra direct in sesiunea ta de panel.</p>

    <div id="error" class="error"></div>

    <div class="field">
      <label for="admin-name">Admin Name</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <input id="admin-name" type="text" placeholder="Ex: sbyk" autocomplete="off" />
      </div>
    </div>

    <div class="field">
      <label for="admin-key">Admin Key</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V8a5 5 0 0 1 10 0v3"></path></svg>
        <input id="admin-key" type="password" placeholder="ADMIN_KEY din Vercel" autocomplete="off" />
      </div>
    </div>

    <button id="login-btn" class="btn" type="button">Intra in Panel</button>

    <div class="footer">Powered by <strong>SEVID RP</strong> | Vercel + Roblox Messaging</div>
  </section>

  <script>
    const errorBox = document.getElementById("error");
    const nameInput = document.getElementById("admin-name");
    const keyInput = document.getElementById("admin-key");
    const loginBtn = document.getElementById("login-btn");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    async function doLogin() {
      const adminName = nameInput.value.trim();
      const adminKey = keyInput.value.trim();

      errorBox.style.display = "none";

      if (!adminName || !adminKey) {
        showError("Completeaza ambele campuri.");
        return;
      }

      // Verificam cheia real prin API - nu mai intram fara cheie corecta
      loginBtn.disabled = true;
      loginBtn.textContent = "Se verifica...";

      try {
        const response = await fetch("/api/dashboard", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminKey, adminName }),
        });

        let data = {};
        try { data = await response.json(); } catch (_) {}

        if (data.ok) {
          sessionStorage.setItem("adminName", adminName);
          sessionStorage.setItem("adminKey", adminKey);
          window.location.href = "/panel";
        } else {
          showError(data.msg || "Cheie admin invalida. Verifica ADMIN_KEY din Vercel.");
          loginBtn.disabled = false;
          loginBtn.textContent = "Intra in Panel";
        }
      } catch (err) {
        showError("Eroare conexiune la server: " + err.message);
        loginBtn.disabled = false;
        loginBtn.textContent = "Intra in Panel";
      }
    }

    loginBtn.addEventListener("click", doLogin);
    keyInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") doLogin();
    });

    // Daca ai deja o sesiune valida, mergi direct la panel
    if (sessionStorage.getItem("adminKey") && sessionStorage.getItem("adminName")) {
      window.location.href = "/panel";
    }
  </script>
</body>
</html>
