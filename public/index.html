<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEVID RP — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0c12;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,194,255,.08) 0,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(124,58,237,.08) 0,transparent 60%)}
.card{background:#12151e;border:1px solid #252a38;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo .brand{font-size:30px;font-weight:800;background:linear-gradient(135deg,#00c2ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{font-size:13px;color:#6b7280;margin-top:6px}
.form-group{margin-bottom:18px}
label{display:block;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
input{width:100%;background:#0a0c12;border:1px solid #252a38;border-radius:10px;padding:13px 16px;color:#e8eaf0;font-size:14px;font-family:inherit;outline:none;transition:.2s}
input:focus{border-color:#00c2ff;box-shadow:0 0 0 3px rgba(0,194,255,.1)}
.btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#00c2ff,#0090cc);color:#000;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px;transition:.2s;font-family:inherit}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.error{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:#ff3b5c;margin-bottom:18px;display:none}
.separator{display:flex;align-items:center;gap:12px;margin:20px 0;color:#6b7280;font-size:12px}
.separator::before,.separator::after{content:'';flex:1;height:1px;background:#252a38}
.btn-firebase{width:100%;padding:13px;border-radius:10px;background:transparent;border:1px solid #252a38;color:#e8eaf0;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:.2s}
.btn-firebase:hover{border-color:#00c2ff;background:rgba(0,194,255,.05)}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#6b7280}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="brand">SEVID RP</div>
    <div class="sub">Admin Panel — Autentificare</div>
  </div>

  <div class="error" id="err-box">⚠️ <span id="err-text"></span></div>

  <div class="form-group">
    <label>Numele tău (Admin)</label>
    <input type="text" id="admin-name" placeholder="Ex: sbyk" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Cheie Admin (ADMIN_KEY)</label>
    <input type="password" id="admin-key" placeholder="••••••••" autocomplete="off">
  </div>
  <button class="btn" onclick="doLogin()">🔐 Intră în Panel</button>

  <div class="separator">sau</div>

  <!-- Firebase Google Auth (optional) -->
  <button class="btn-firebase" id="btn-google" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4A90E2" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Continuă cu Google
  </button>

  <div class="footer">SEVID RP © 2024 — Acces restricționat</div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ⚠️ ÎNLOCUIEȘTE CU CONFIGURAȚIA TA FIREBASE
  const firebaseConfig = {
    apiKey:            "FIREBASE_API_KEY",
    authDomain:        "FIREBASE_AUTH_DOMAIN",
    projectId:         "FIREBASE_PROJECT_ID",
    storageBucket:     "FIREBASE_STORAGE_BUCKET",
    messagingSenderId: "FIREBASE_SENDER_ID",
    appId:             "FIREBASE_APP_ID"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Expunem global pentru butoane
  window.googleLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;
      // Dacă e Google login, folosim email-ul ca admin name
      sessionStorage.setItem("adminKey",  "GOOGLE_LOGIN");
      sessionStorage.setItem("adminName", user.displayName || user.email);
      sessionStorage.setItem("firebaseUid", user.uid);
      sessionStorage.setItem("firebaseToken", await user.getIdToken());
      window.location.href = "/dashboard";
    } catch (e) {
      showErr("Eroare Google Login: " + e.message);
    }
  };

  // Dacă e deja logat Firebase, redirecționăm
  auth.onAuthStateChanged(user => {
    if (user && sessionStorage.getItem("adminKey")) {
      window.location.href = "/dashboard";
    }
  });
</script>

<script>
function showErr(msg) {
  document.getElementById('err-text').textContent = msg;
  document.getElementById('err-box').style.display = 'block';
}

function doLogin() {
  const name = document.getElementById('admin-name').value.trim();
  const key  = document.getElementById('admin-key').value.trim();
  if (!name || !key) { showErr('Completează ambele câmpuri!'); return; }
  // Stocăm în sessionStorage și verificăm la prima cerere
  sessionStorage.setItem('adminKey',  key);
  sessionStorage.setItem('adminName', name);
  window.location.href = '/dashboard';
}

// Enter key
document.getElementById('admin-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Dacă e deja logat, mergi la dashboard
if (sessionStorage.getItem('adminKey')) window.location.href = '/dashboard';
</script>
</body>
</html>
