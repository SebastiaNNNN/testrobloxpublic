<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEVID RP — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0c12;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,194,255,.07) 0,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(124,58,237,.07) 0,transparent 60%);pointer-events:none}
.card{background:#12151e;border:1px solid #252a38;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:32px}
.logo .brand{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00c2ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo .sub{font-size:13px;color:#6b7280;margin-top:4px}
.form-group{margin-bottom:18px}
label{display:block;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
input{width:100%;background:#0a0c12;border:1px solid #252a38;border-radius:10px;padding:13px 16px;color:#e8eaf0;font-size:14px;font-family:inherit;outline:none;transition:.2s}
input:focus{border-color:#00c2ff;box-shadow:0 0 0 3px rgba(0,194,255,.1)}
.btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#00c2ff,#0090cc);color:#000;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:.2s;font-family:inherit}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.error{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.25);border-radius:10px;padding:12px 16px;font-size:13px;color:#ff3b5c;margin-bottom:18px}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#6b7280}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">
    <div class="brand">SEVID RP</div>
    <div class="sub">Admin Panel — Autentificare</div>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Numele tău (Admin)</label>
      <input type="text" name="admin_name" placeholder="Ex: sbyk" required>
    </div>
    <div class="form-group">
      <label>Parolă Admin</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">🔐 Intră în Panel</button>
  </form>
  <div class="footer">SEVID RP © 2024 — Acces restricționat</div>
</div>
</body>
</html>
